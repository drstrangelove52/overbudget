services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MARIADB_DATABASE: overbudget
      MARIADB_USER: overbudget
      MARIADB_PASSWORD: ${DB_PASSWORD:-overbudget}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://overbudget:${DB_PASSWORD:-overbudget}@db:3306/overbudget
      REDIS_URL: redis://redis:6379/0
      ATTACHMENTS_PATH: /data/attachments
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      GPG_PASSPHRASE: ${GPG_PASSPHRASE:-}
    volumes:
      - ./backend:/app
      - attachments:/data/attachments
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://overbudget:${DB_PASSWORD:-overbudget}@db:3306/overbudget
      REDIS_URL: redis://redis:6379/0
      ATTACHMENTS_PATH: /data/attachments
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      GPG_PASSPHRASE: ${GPG_PASSPHRASE:-}
    volumes:
      - ./backend:/app
      - attachments:/data/attachments
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app:celery worker --loglevel=info

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  db_data:
  redis_data:
  attachments:
  caddy_data:
  caddy_config:
